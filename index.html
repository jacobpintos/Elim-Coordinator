<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Test</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
body{background:#0c0c0e;color:#f0ede6;font-family:monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
</style>
</head>
<body>
<div id="root"></div>
<script>
// No Firebase, no JSX, no Babel — plain JS only
const e = React.createElement;
function App() {
  const [count, setCount] = React.useState(0);
  return e('div', {style:{textAlign:'center'}},
    e('h1', {style:{fontSize:32,marginBottom:16}}, 'It works!'),
    e('p', {style:{marginBottom:16,color:'#9a9590'}}, 'React is running. Count: ' + count),
    e('button', {
      onClick: () => setCount(c => c+1),
      style:{background:'#e8c97d',color:'#0c0c0e',border:'none',padding:'10px 24px',borderRadius:8,cursor:'pointer',fontFamily:'monospace',fontSize:14}
    }, 'Click me')
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App, null));
</script>
</body>
</html>
