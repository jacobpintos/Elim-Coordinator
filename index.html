<script>const {
  useState,
  useEffect,
  useRef
} = React;

// ── Firestore helpers ─────────────────────────────────────────────────────────
const COL = "elim-coordinator";
let db, fsDoc, fsGet, fsSet;
function waitForFS() {
  return new Promise((res, rej) => {
    if (window._fsReady) {
      db = window._db; fsDoc = window._fsDoc; fsGet = window._fsGet; fsSet = window._fsSet;
      res();
    } else {
      const t = setTimeout(() => rej(new Error("Firebase failed to load — check network or browser extensions")), 4000);
      document.addEventListener("fs-ready", () => {
        clearTimeout(t);
        db = window._db; fsDoc = window._fsDoc; fsGet = window._fsGet; fsSet = window._fsSet;
        res();
      }, { once: true });
    }
  });
}
async function fsLoad() {
  await waitForFS();
  try {
    const snap = await fsGet(fsDoc(db, COL, "appdata"));
    if (!snap.exists()) return {
      events: [],
      expectedNames: [],
      responses: {},
      archivedEvents: []
    };
    const d = snap.data();
    // Sanitise — ensure all fields are the right type so bad data never crashes the app
    return {
      events: Array.isArray(d.events) ? d.events : [],
      expectedNames: Array.isArray(d.expectedNames) ? d.expectedNames : [],
      responses: d.responses && typeof d.responses === "object" && !Array.isArray(d.responses) ? d.responses : {},
      archivedEvents: Array.isArray(d.archivedEvents) ? d.archivedEvents : []
    };
  } catch (e) {
    console.error("Firestore load error:", e);
    return {
      events: [],
      expectedNames: [],
      responses: {},
      archivedEvents: [],
      _loadError: e.message
    };
  }
}
async function fsReset() {
  await waitForFS();
  await fsSet(fsDoc(db, COL, "appdata"), {
    events: [],
    expectedNames: [],
    responses: {},
    archivedEvents: []
  }, {
    merge: false
  });
}
async function fsSave(d) {
  await waitForFS();
  await fsSet(fsDoc(db, COL, "appdata"), {
    events: d.events || [],
    expectedNames: d.expectedNames || [],
    responses: d.responses || {},
    archivedEvents: d.archivedEvents || []
  }, {
    merge: false
  });
}
async function fsGetPassword() {
  await waitForFS();
  const snap = await fsGet(fsDoc(db, "config", "settings"));
  if (!snap.exists()) return "admin123";
  return snap.data().adminPassword || "admin123";
}
async function fsSetPassword(pw) {
  await waitForFS();
  await fsSet(fsDoc(db, "config", "settings"), {
    adminPassword: pw
  }, {
    merge: true
  });
}

// ── Utilities ─────────────────────────────────────────────────────────────────
const gid = () => Math.random().toString(36).slice(2, 10);
function fmtDate(d) {
  if (!d) return "";
  const [y, m, day] = d.split("-");
  return new Date(y, m - 1, day).toLocaleDateString("en-US", {
    weekday: "short",
    month: "short",
    day: "numeric",
    year: "numeric"
  });
}
function fmtTime(s) {
  if (!s) return s;
  const [h, m] = s.split(":");
  const ap = +h >= 12 ? "pm" : "am";
  return `${+h % 12 || 12}:${m}${ap}`;
}
function slotTime(s) {
  return s.allDay ? "All Day" : `${fmtTime(s.eventTime)} – ${fmtTime(s.leaveTime)}`;
}

// ── Archive helpers ───────────────────────────────────────────────────────────
function isPast(ev) {
  const t = new Date();
  t.setHours(0, 0, 0, 0);
  return ev.days.every(d => new Date(d.date) < t);
}
function lastDate(ev) {
  return ev.days.map(d => d.date).sort().at(-1);
}
function purge(data) {
  const cut = new Date();
  cut.setFullYear(cut.getFullYear() - 1);
  const keep = (data.archivedEvents || []).filter(ev => new Date(lastDate(ev)) >= cut);
  return keep.length === (data.archivedEvents || []).length ? data : {
    ...data,
    archivedEvents: keep
  };
}
function archive(data) {
  const past = data.events.filter(isPast);
  if (!past.length) return data;
  const ids = new Set(past.map(e => e.id));
  return {
    ...data,
    events: data.events.filter(e => !ids.has(e.id)),
    archivedEvents: [...(data.archivedEvents || []), ...past.filter(p => !(data.archivedEvents || []).some(a => a.id === p.id))]
  };
}

// ── Calendar helpers ──────────────────────────────────────────────────────────
function icsDate(d, t) {
  const [y, m, day] = d.split("-");
  if (!t) return `${y}${m}${day}`;
  const [h, mi] = t.split(":");
  return `${y}${m}${day}T${h}${mi}00`;
}
function nextDay(d) {
  const x = new Date(d);
  x.setDate(x.getDate() + 1);
  return x.toISOString().slice(0, 10).replace(/-/g, "");
}
function buildICS(evs) {
  const uid = () => Math.random().toString(36).slice(2) + "@ec";
  const lines = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//ElimCoordinator//EN", "CALSCALE:GREGORIAN", "METHOD:PUBLISH"];
  for (const e of evs) {
    lines.push("BEGIN:VEVENT", `UID:${uid()}`, `SUMMARY:${e.name}${e.partial ? " (Partial)" : ""}`, `LOCATION:${e.location}`);
    if (e.allDay) {
      lines.push(`DTSTART;VALUE=DATE:${e.date.replace(/-/g, "")}`, `DTEND;VALUE=DATE:${nextDay(e.date)}`);
    } else {
      lines.push(`DTSTART:${icsDate(e.date, e.eventTime)}`, `DTEND:${icsDate(e.date, e.leaveTime)}`);
    }
    if (e.partial && e.note) lines.push(`DESCRIPTION:Partial — ${e.note}`);
    lines.push("END:VEVENT");
  }
  lines.push("END:VCALENDAR");
  return lines.join("\r\n");
}
function dlICS(evs) {
  const b = new Blob([buildICS(evs)], {
    type: "text/calendar"
  });
  const u = URL.createObjectURL(b);
  const a = document.createElement("a");
  a.href = u;
  a.download = "events.ics";
  a.click();
  URL.revokeObjectURL(u);
}
function gcal(e) {
  const f = (d, t) => {
    const [y, m, day] = d.split("-");
    if (!t) return `${y}${m}${day}`;
    const [h, mi] = t.split(":");
    return `${y}${m}${day}T${h}${mi}00`;
  };
  const dates = e.allDay ? `${f(e.date)}/${nextDay(e.date)}` : `${f(e.date, e.eventTime)}/${f(e.date, e.leaveTime)}`;
